  #     - redis_data:/data
  #   command: ["redis-server", "--appendonly", "yes"]
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 3s
  #     retries: 5

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
