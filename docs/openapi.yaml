openapi: 3.0.3
info:
  title: AI Services Platform API
  version: 2.0.0
  description: |
    APIs for AI-powered virtual assistant services including:
    - **Chat**: Text-based conversations with token-by-token streaming
    - **Voice**: Phone-based virtual assistant with real-time audio
    - **Settings**: Configuration management for assistants
    - **Call Logs**: Historical call records and transcripts
    
    ## Chat Streaming
    The chat API supports two modes:
    - **POST /chat/message**: Non-streaming (backward compatible)
    - **GET /chat/message/stream**: Real-time token streaming via SSE
    
    Token streaming reduces time to first token by 94% (5-8s → 0.3-0.5s)
    providing a ChatGPT-like progressive response experience.
    
    ## Authentication
    All endpoints require JWT Bearer token authentication except voice webhooks.

servers:
  - url: https://api.yourdomain.com
    description: Production server
  - url: http://localhost:5000
    description: Local development

tags:
  - name: Chat
    description: |
      Text-based chat operations with real-time token streaming support.
      Supports both blocking and streaming modes for flexibility.
  - name: Voice
    description: |
      Phone-based virtual assistant operations including call handling,
      audio streaming, and call management.
  - name: Assistant Settings
    description: Configuration management for virtual assistants
  - name: Assistant Calls
    description: Call logs, transcripts, and usage metrics

paths:
  /chat/session:
    post:
      summary: Initialize a new chat session
      tags: [Chat]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customerId:
                  type: string
                  description: Customer identifier
                productId:
                  type: string
                  description: Product/service identifier
                  default: va-service
              required: [customerId]
      responses:
        '200':
          description: Chat session initialized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatSessionResponse'
        '401':
          description: Unauthorized
        '403':
          description: Chat channel not enabled
        '500':
          description: Service error

  /chat/message:
    post:
      summary: Send a message (non-streaming)
      tags: [Chat]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionId:
                  type: string
                  description: Active session identifier
                message:
                  type: string
                  description: User's message text
              required: [sessionId, message]
      responses:
        '200':
          description: Assistant response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessageResponse'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '500':
          description: Processing error

  /chat/message/stream:
    get:
      summary: Send a message with token-by-token streaming (SSE)
      description: |
        Streams LLM response tokens in real-time using Server-Sent Events (SSE).
        Reduces time to first token from 5-8s to 0.3-0.5s (94% faster).
        
        SSE Events:
        - `token`: Each token as it arrives from LLM
        - `complete`: Streaming finished with final metadata
        - `error`: Error occurred during streaming
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: sessionId
          required: true
          schema:
            type: string
          description: Active session identifier
        - in: query
          name: message
          required: true
          schema:
            type: string
          description: User's message text
      responses:
        '200':
          description: Server-Sent Events stream
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  SSE format with multiple event types:
                  
                  event: token
                  data: {"token":"Hello","sessionId":"abc123"}
                  
                  event: complete
                  data: {"sessionId":"abc123","intent":"greeting","complete":true}
              examples:
                tokenEvent:
                  summary: Token event
                  value: |
                    event: token
                    data: {"token":"Hello","sessionId":"abc123"}
                    
                    event: token
                    data: {"token":" there","sessionId":"abc123"}
                completeEvent:
                  summary: Complete event
                  value: |
                    event: complete
                    data: {"sessionId":"abc123","intent":"greeting","complete":true}
                errorEvent:
                  summary: Error event
                  value: |
                    event: error
                    data: {"error":"Stream connection lost"}
        '400':
          description: Missing required parameters
        '401':
          description: Unauthorized
        '500':
          description: Streaming error

  /chat/end:
    post:
      summary: End a chat session
      tags: [Chat]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionId:
                  type: string
              required: [sessionId]
      responses:
        '200':
          description: Session ended
        '400':
          description: Invalid request
        '401':
          description: Unauthorized

  /chat/history/{sessionId}:
    get:
      summary: Get conversation history for a session
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
          description: Session identifier
      responses:
        '200':
          description: Conversation history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatHistory'
        '401':
          description: Unauthorized
        '404':
          description: Session not found
        '500':
          description: Retrieval error

  /voice/incoming:
    post:
      summary: Handle incoming phone call webhook from telephony provider
      tags: [Voice]
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                To:
                  type: string
                  description: The number that was called (assistant phone number)
                From:
                  type: string
                  description: Caller phone number
                CallSid:
                  type: string
                  description: Telephony provider call identifier
              required: [To, From]
      responses:
        '200':
          description: TwiML/voice instructions to the telephony provider
          content:
            application/xml:
              schema:
                type: string
        '400':
          description: Invalid request

  /voice/stream:
    post:
      summary: Handle streaming audio chunks during an active call
      tags: [Voice]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                callId:
                  type: string
                  description: Internal call identifier (assistant_calls._id)
                audioChunk:
                  type: string
                  format: byte
                  description: Encoded audio chunk from telephony provider
              required: [callId, audioChunk]
      responses:
        '200':
          description: Voice response or streaming instructions
          content:
            application/json:
              schema:
                type: object
                properties:
                  ttsAudio:
                    type: string
                    format: byte
                    description: Encoded audio to play back to caller
        '400':
          description: Invalid payload

  /voice/end:
    post:
      summary: Mark a call as ended and finalize metrics
      tags: [Voice]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                callId:
                  type: string
                durationSeconds:
                  type: integer
                endedBy:
                  type: string
                  enum: [caller, assistant, system]
              required: [callId, durationSeconds, endedBy]
      responses:
        '200':
          description: Call end recorded
        '400':
          description: Invalid payload

  /assistant/settings:
    get:
      summary: Get phone assistant settings for current customer
      tags: [Assistant Settings]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Assistant settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssistantSettings'
        '401':
          description: Unauthorized
    patch:
      summary: Update phone assistant settings for current customer
      tags: [Assistant Settings]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAssistantSettingsRequest'
      responses:
        '200':
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssistantSettings'
        '400':
          description: Invalid data
        '401':
          description: Unauthorized

  /assistant/calls:
    get:
      summary: List assistant call logs for current customer
      tags: [Assistant Calls]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
        - in: query
          name: status
          schema:
            type: string
            enum: [completed, missed, forwarded, failed]
      responses:
        '200':
          description: List of call logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AssistantCall'
        '401':
          description: Unauthorized

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ChatSessionResponse:
      type: object
      properties:
        sessionId:
          type: string
          description: Unique session identifier
        customerId:
          type: string
        productId:
          type: string
        status:
          type: string
          enum: [initialized, resumed]
        message:
          type: string
          description: Status message
        greeting:
          type: string
          description: LLM-generated greeting message
        chatConfig:
          type: object
          properties:
            greeting:
              type: string
            typingIndicator:
              type: boolean
            maxTurns:
              type: integer
            showIntent:
              type: boolean
        messages:
          type: array
          description: Previous messages if resuming session
          items:
            $ref: '#/components/schemas/ChatMessage'
      required:
        - sessionId
        - customerId
        - productId
        - status

    ChatMessageResponse:
      type: object
      properties:
        sessionId:
          type: string
        message:
          type: string
          description: Single assistant response (backward compatible)
        messages:
          type: array
          description: Multiple messages for proactive follow-ups
          items:
            type: string
        intent:
          type: string
          description: Detected user intent
        extractedSlots:
          type: object
          description: Extracted entities/parameters
          additionalProperties: true
        requiresAction:
          type: boolean
          description: Whether action is needed (e.g., transfer)
        suggestedAction:
          type: string
          description: Action to take if requiresAction is true
      required:
        - sessionId
        - message

    ChatHistory:
      type: object
      properties:
        sessionId:
          type: string
        customerId:
          type: string
        productId:
          type: string
        startedAt:
          type: string
          format: date-time
        lastUpdatedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
          nullable: true
        active:
          type: boolean
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
      required:
        - sessionId
        - customerId
        - startedAt
        - active
        - messages

    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        timestamp:
          type: string
          format: date-time
        intent:
          type: string
          nullable: true
      required:
        - role
        - content
        - timestamp

    AssistantSettings:
      type: object
      properties:
        customerId:
          type: string
        phoneEnabled:
          type: boolean
        phoneNumber:
          type: string
        fallbackNumber:
          type: string
          nullable: true
        businessHours:
          type: object
          properties:
            timezone:
              type: string
            monday:
              $ref: '#/components/schemas/BusinessHoursDay'
            tuesday:
              $ref: '#/components/schemas/BusinessHoursDay'
            wednesday:
              $ref: '#/components/schemas/BusinessHoursDay'
            thursday:
              $ref: '#/components/schemas/BusinessHoursDay'
            friday:
              $ref: '#/components/schemas/BusinessHoursDay'
            saturday:
              $ref: '#/components/schemas/BusinessHoursDay'
            sunday:
              $ref: '#/components/schemas/BusinessHoursDay'
        voice:
          type: object
          properties:
            language:
              type: string
              example: en-US
            voiceId:
              type: string
            speechRate:
              type: number
              format: float
      required: [customerId, phoneEnabled, phoneNumber]

    BusinessHoursDay:
      type: object
      properties:
        open:
          type: string
          nullable: true
          example: "09:00"
        close:
          type: string
          nullable: true
          example: "17:00"

    UpdateAssistantSettingsRequest:
      type: object
      properties:
        phoneEnabled:
          type: boolean
        fallbackNumber:
          type: string
        businessHours:
          type: object
        voice:
          type: object
      additionalProperties: false

    AssistantCall:
      type: object
      properties:
        id:
          type: string
        customerId:
          type: string
        assistantPhoneNumber:
          type: string
        callerNumber:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
          nullable: true
        durationSeconds:
          type: integer
          nullable: true
        status:
          type: string
          enum: [completed, missed, forwarded, failed, in_progress]
        endedBy:
          type: string
          enum: [caller, assistant, system]
          nullable: true
        forwardedTo:
          type: string
          nullable: true
        usage:
          type: object
          properties:
            sttSeconds:
              type: integer
            ttsCharacters:
              type: integer
            llmTokensIn:
              type: integer
            llmTokensOut:
              type: integer
        transcript:
          type: array
          items:
            $ref: '#/components/schemas/TranscriptTurn'
      required:
        - id
        - customerId
        - assistantPhoneNumber
        - callerNumber
        - startTime
        - status

    TranscriptTurn:
      type: object
      properties:
        speaker:
          type: string
          enum: [caller, assistant]
        text:
          type: string
        timestamp:
          type: number
          format: float