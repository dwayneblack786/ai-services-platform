openapi: 3.0.3
info:
  title: AI Services Platform API
  version: 2.0.0
  description: |
    APIs for AI-powered virtual assistant services including:
    - **Chat**: Text-based conversations with token-by-token streaming
    - **Voice**: Phone-based virtual assistant with real-time audio
    - **Settings**: Configuration management for assistants
    - **Call Logs**: Historical call records and transcripts
    
    ## Chat Streaming
    The chat API supports two modes:
    - **POST /chat/message**: Non-streaming (backward compatible)
    - **GET /chat/message/stream**: Real-time token streaming via SSE
    
    Token streaming reduces time to first token by 94% (5-8s → 0.3-0.5s)
    providing a ChatGPT-like progressive response experience.
    
    ## Authentication
    All endpoints require JWT Bearer token authentication except voice webhooks.

servers:
  - url: https://api.yourdomain.com
    description: Production server
  - url: http://localhost:5000
    description: Local development

tags:
  - name: Chat
    description: |
      Text-based chat operations with real-time token streaming support.
      Supports both blocking and streaming modes for flexibility.
  - name: Voice
    description: |
      Phone-based virtual assistant operations including call handling,
      audio streaming, and call management.
  - name: Assistant Settings
    description: Configuration management for virtual assistants
  - name: Assistant Calls
    description: Call logs, transcripts, and usage metrics

paths:
  /chat/session:
    post:
      summary: Initialize a new chat session
      tags: [Chat]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customerId:
                  type: string
                  description: Customer identifier
                productId:
                  type: string
                  description: Product/service identifier
                  default: va-service
              required: [customerId]
      responses:
        '200':
          description: Chat session initialized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatSessionResponse'
        '401':
          description: Unauthorized
        '403':
          description: Chat channel not enabled
        '500':
          description: Service error

  /chat/message:
    post:
      summary: Send a message (non-streaming)
      tags: [Chat]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionId:
                  type: string
                  description: Active session identifier
                message:
                  type: string
                  description: User's message text
              required: [sessionId, message]
      responses:
        '200':
          description: Assistant response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessageResponse'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '500':
          description: Processing error

  /chat/message/stream:
    get:
      summary: Send a message with token-by-token streaming (SSE)
      description: |
        Streams LLM response tokens in real-time using Server-Sent Events (SSE).
        Reduces time to first token from 5-8s to 0.3-0.5s (94% faster).
        
        SSE Events:
        - `token`: Each token as it arrives from LLM
        - `complete`: Streaming finished with final metadata
        - `error`: Error occurred during streaming
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: sessionId
          required: true
          schema:
            type: string
          description: Active session identifier
        - in: query
          name: message
          required: true
          schema:
            type: string
          description: User's message text
      responses:
        '200':
          description: Server-Sent Events stream
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  SSE format with multiple event types:
                  
                  event: token
                  data: {"token":"Hello","sessionId":"abc123"}
                  
                  event: complete
                  data: {"sessionId":"abc123","intent":"greeting","complete":true}
              examples:
                tokenEvent:
                  summary: Token event
                  value: |
                    event: token
                    data: {"token":"Hello","sessionId":"abc123"}
                    
                    event: token
                    data: {"token":" there","sessionId":"abc123"}
                completeEvent:
                  summary: Complete event
                  value: |
                    event: complete
                    data: {"sessionId":"abc123","intent":"greeting","complete":true}
                errorEvent:
                  summary: Error event
                  value: |
                    event: error
                    data: {"error":"Stream connection lost"}
        '400':
          description: Missing required parameters
        '401':
          description: Unauthorized
        '500':
          description: Streaming error

  /chat/end:
    post:
      summary: End a chat session
      tags: [Chat]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionId:
                  type: string
              required: [sessionId]
      responses:
        '200':
          description: Session ended
        '400':
          description: Invalid request
        '401':
          description: Unauthorized

  /chat/history/{sessionId}:
    get:
      summary: Get conversation history for a session
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
          description: Session identifier
      responses:
        '200':
          description: Conversation history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatHistory'
        '401':
          description: Unauthorized
        '404':
          description: Session not found
        '500':
          description: Retrieval error

  /api/voice/incoming:
    post:
      summary: Universal VoIP webhook - Auto-detects Twilio, Vonage, or Bandwidth
      tags: [Voice]
      description: |
        Universal webhook endpoint that automatically detects VoIP provider and returns
        provider-specific response (TwiML XML, NCCO JSON, or BXML XML).
        
        **Auto-Detection:**
        - **Twilio**: `CallSid` field or `x-twilio-signature` header
        - **Vonage**: `uuid` + `conversation_uuid` fields
        - **Bandwidth**: `callId` + `applicationId` fields
        
        **See**: [Voice Endpoints Architecture](VOICE_ENDPOINTS_ARCHITECTURE.md)
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              description: Twilio format (form-urlencoded)
              properties:
                CallSid:
                  type: string
                  description: Twilio call identifier
                From:
                  type: string
                  description: Caller phone number
                To:
                  type: string
                  description: Called number (assistant phone number)
              required: [From, To]
          application/json:
            schema:
              oneOf:
                - type: object
                  description: Vonage format
                  properties:
                    uuid:
                      type: string
                    conversation_uuid:
                      type: string
                    from:
                      type: string
                    to:
                      type: string
                  required: [uuid, from, to]
                - type: object
                  description: Bandwidth format
                  properties:
                    callId:
                      type: string
                    from:
                      type: string
                    to:
                      type: string
                    applicationId:
                      type: string
                  required: [callId, from, to, applicationId]
      responses:
        '200':
          description: Provider-specific call control response
          content:
            application/xml:
              schema:
                type: string
                description: TwiML XML (Twilio) or BXML XML (Bandwidth)
            application/json:
              schema:
                type: array
                description: NCCO JSON (Vonage)
                items:
                  type: object
        '400':
          description: Invalid request or unrecognized provider
        '403':
          description: Outside business hours

  /api/voice/stream:
    post:
      summary: Process audio chunks during active call
      tags: [Voice]
      description: |
        Receives audio from VoIP provider, processes through STT → LLM → TTS,
        returns audio response.
        
        **Pipeline**: WhisperSTT → ChatSession → AzureTTS
        
        **Audio Formats**:
        - Twilio/Bandwidth: μ-law, 8kHz, Base64
        - Vonage: PCM, 16kHz, Base64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                callId:
                  type: string
                  description: MongoDB assistant_calls._id
                  example: 507f1f77bcf86cd799439011
                audioChunk:
                  type: string
                  format: byte
                  description: Base64-encoded audio chunk
                  example: UklGRiQAAABXQVZFZm10IBAAAAABAAEA...
              required: [callId, audioChunk]
      responses:
        '200':
          description: TTS audio response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ttsAudio:
                    type: string
                    format: byte
                    description: Base64 TTS audio (μ-law or PCM)
                  transcription:
                    type: string
                    description: User's speech text
                  assistantResponse:
                    type: string
                    description: Assistant's text (before TTS)
        '400':
          description: Invalid payload
        '404':
          description: Call not found
        '502':
          description: VA service unavailable

  /api/voice/end:
    post:
      summary: Finalize call and record metrics
      tags: [Voice]
      description: |
        Finalizes voice call session, updates MongoDB with metrics, stores transcript.
        
        **Actions**:
        - Update status to 'completed'
        - Calculate usage (STT seconds, TTS chars, LLM tokens)
        - Store transcript and conversation history
        - Trigger billing calculations
        - Java VA service cleanup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                callId:
                  type: string
                  description: MongoDB call identifier
                  example: 507f1f77bcf86cd799439011
                durationSeconds:
                  type: integer
                  description: Total call duration
                  example: 180
                endedBy:
                  type: string
                  enum: [caller, assistant, system]
                  description: Who initiated termination
                  example: caller
              required: [callId, durationSeconds, endedBy]
      responses:
        '200':
          description: Call finalized successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  callSummary:
                    type: object
                    properties:
                      callId:
                        type: string
                      duration:
                        type: integer
                      sttSeconds:
                        type: number
                      ttsCharacters:
                        type: integer
                      llmTokens:
                        type: integer
                      costEstimate:
                        type: number
        '400':
          description: Invalid payload
        '404':
          description: Call not found

  /assistant/settings:
    get:
      summary: Get phone assistant settings for current customer
      tags: [Assistant Settings]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Assistant settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssistantSettings'
        '401':
          description: Unauthorized
    patch:
      summary: Update phone assistant settings for current customer
      tags: [Assistant Settings]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAssistantSettingsRequest'
      responses:
        '200':
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssistantSettings'
        '400':
          description: Invalid data
        '401':
          description: Unauthorized

  /assistant/calls:
    get:
      summary: List assistant call logs for current customer
      tags: [Assistant Calls]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
        - in: query
          name: status
          schema:
            type: string
            enum: [completed, missed, forwarded, failed]
      responses:
        '200':
          description: List of call logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AssistantCall'
        '401':
          description: Unauthorized

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ChatSessionResponse:
      type: object
      properties:
        sessionId:
          type: string
          description: Unique session identifier
        customerId:
          type: string
        productId:
          type: string
        status:
          type: string
          enum: [initialized, resumed]
        message:
          type: string
          description: Status message
        greeting:
          type: string
          description: LLM-generated greeting message
        chatConfig:
          type: object
          properties:
            greeting:
              type: string
            typingIndicator:
              type: boolean
            maxTurns:
              type: integer
            showIntent:
              type: boolean
        messages:
          type: array
          description: Previous messages if resuming session
          items:
            $ref: '#/components/schemas/ChatMessage'
      required:
        - sessionId
        - customerId
        - productId
        - status

    ChatMessageResponse:
      type: object
      properties:
        sessionId:
          type: string
        message:
          type: string
          description: Single assistant response (backward compatible)
        messages:
          type: array
          description: Multiple messages for proactive follow-ups
          items:
            type: string
        intent:
          type: string
          description: Detected user intent
        extractedSlots:
          type: object
          description: Extracted entities/parameters
          additionalProperties: true
        requiresAction:
          type: boolean
          description: Whether action is needed (e.g., transfer)
        suggestedAction:
          type: string
          description: Action to take if requiresAction is true
      required:
        - sessionId
        - message

    ChatHistory:
      type: object
      properties:
        sessionId:
          type: string
        customerId:
          type: string
        productId:
          type: string
        startedAt:
          type: string
          format: date-time
        lastUpdatedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
          nullable: true
        active:
          type: boolean
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
      required:
        - sessionId
        - customerId
        - startedAt
        - active
        - messages

    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        timestamp:
          type: string
          format: date-time
        intent:
          type: string
          nullable: true
      required:
        - role
        - content
        - timestamp

    AssistantSettings:
      type: object
      properties:
        customerId:
          type: string
        phoneEnabled:
          type: boolean
        phoneNumber:
          type: string
        fallbackNumber:
          type: string
          nullable: true
        businessHours:
          type: object
          properties:
            timezone:
              type: string
            monday:
              $ref: '#/components/schemas/BusinessHoursDay'
            tuesday:
              $ref: '#/components/schemas/BusinessHoursDay'
            wednesday:
              $ref: '#/components/schemas/BusinessHoursDay'
            thursday:
              $ref: '#/components/schemas/BusinessHoursDay'
            friday:
              $ref: '#/components/schemas/BusinessHoursDay'
            saturday:
              $ref: '#/components/schemas/BusinessHoursDay'
            sunday:
              $ref: '#/components/schemas/BusinessHoursDay'
        voice:
          type: object
          properties:
            language:
              type: string
              example: en-US
            voiceId:
              type: string
            speechRate:
              type: number
              format: float
      required: [customerId, phoneEnabled, phoneNumber]

    BusinessHoursDay:
      type: object
      properties:
        open:
          type: string
          nullable: true
          example: "09:00"
        close:
          type: string
          nullable: true
          example: "17:00"

    UpdateAssistantSettingsRequest:
      type: object
      properties:
        phoneEnabled:
          type: boolean
        fallbackNumber:
          type: string
        businessHours:
          type: object
        voice:
          type: object
      additionalProperties: false

    AssistantCall:
      type: object
      properties:
        id:
          type: string
        customerId:
          type: string
        assistantPhoneNumber:
          type: string
        callerNumber:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
          nullable: true
        durationSeconds:
          type: integer
          nullable: true
        status:
          type: string
          enum: [completed, missed, forwarded, failed, in_progress]
        endedBy:
          type: string
          enum: [caller, assistant, system]
          nullable: true
        forwardedTo:
          type: string
          nullable: true
        usage:
          type: object
          properties:
            sttSeconds:
              type: integer
            ttsCharacters:
              type: integer
            llmTokensIn:
              type: integer
            llmTokensOut:
              type: integer
        transcript:
          type: array
          items:
            $ref: '#/components/schemas/TranscriptTurn'
      required:
        - id
        - customerId
        - assistantPhoneNumber
        - callerNumber
        - startTime
        - status

    TranscriptTurn:
      type: object
      properties:
        speaker:
          type: string
          enum: [caller, assistant]
        text:
          type: string
        timestamp:
          type: number
          format: float