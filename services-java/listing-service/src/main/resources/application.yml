server:
  port: 8137

spring:
  application:
    name: listing-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27018/ai_platform}
      database: ${MONGODB_DATABASE:ai_platform}

listing:
  vision-server-url: ${VISION_SERVER_URL:http://localhost:8001}
  pipeline:
    max-photos: 50
    review-timeout-hours: 72   # auto-expire paused runs after 72h

langchain4j:
  anthropic:
    api-key: ${ANTHROPIC_API_KEY}
    model-name: claude-sonnet-4-6
    max-tokens: 4096
    temperature: 0.7

logging:
  level:
    com.ai.listing: DEBUG
    dev.langchain4j: INFO
