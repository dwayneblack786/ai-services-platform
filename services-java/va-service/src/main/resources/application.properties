# Application Configuration
spring.application.name=va-service
server.port=8136

# MongoDB Configuration
mongodb.uri=mongodb://localhost:27017
mongodb.database=ai_platform

# API Endpoints
# For LM Studio: use full chat completions endpoint
# The OpenAI client library will use this URL directly
api.endpoints.llm.provider=${LLM_PROVIDER:lm-studio}
api.endpoints.llm.url=${LLM_BASE_URL:http://localhost:1234/v1/chat/completions}
api.endpoints.llm.api-key=${LLM_API_KEY:lm-studio}
api.endpoints.llm.model=${LLM_MODEL:google/gemma-2-9b}
api.endpoints.llm.deployment=${LLM_DEPLOYMENT:}
api.client.timeout=300

# Node Backend
node.backend.url=http://localhost:5000

# Logging Configuration
# Set to false to disable ALL debug logging across the application
logging.debug.enabled=true

# gRPC Server Configuration
grpc.server.port=50051

# Spring AI Configuration
# ============================================================================
# Spring AI works with multiple LLM providers using the same code!
# Just change the configuration based on environment.
# ============================================================================

# DEVELOPMENT (LM Studio) - Default
# LM Studio provides OpenAI-compatible API locally
spring.ai.openai.base-url=${LLM_BASE_URL:http://localhost:1234/v1}
spring.ai.openai.api-key=${LLM_API_KEY:lm-studio}
spring.ai.openai.chat.options.model=${LLM_MODEL:google/gemma-2-9b}
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=500

# PRODUCTION (Azure OpenAI) - Override with environment variables
# Set these environment variables in production:
# LLM_BASE_URL=https://your-azure-openai-resource.openai.azure.com/
# LLM_API_KEY=your-azure-api-key
# LLM_MODEL=gpt-4 (or your Azure deployment name)
# 
# For Azure OpenAI, you may also need:
# spring.ai.azure.openai.endpoint=${AZURE_OPENAI_ENDPOINT}
# spring.ai.azure.openai.api-key=${AZURE_OPENAI_KEY}
# spring.ai.azure.openai.deployment-name=${AZURE_OPENAI_DEPLOYMENT}

# Agent Configuration
agent.memory.max-history-size=50
agent.execution.timeout=30000
