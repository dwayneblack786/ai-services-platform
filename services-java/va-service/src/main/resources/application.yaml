server:
  port: 8136
  address: localhost

spring:
  application:
    name: VA-Service
  main:
    banner-mode: off  # Disable default Spring banner for cleaner startup
  data:
    mongodb:
      uri: mongodb://localhost:27017/ai_platform
      # Connection pool settings
      auto-index-creation: true

# Application configuration
app:
  debug: false  # Set to true to enable detailed request/response logging

# MongoDB configuration
mongodb:
  uri: mongodb://localhost:27017
  database: ai_platform
  connection-timeout: 10000  # Connection timeout in milliseconds
  socket-timeout: 30000      # Socket timeout in milliseconds

# Backend configuration
backend:
  url: http://localhost:5000  # Node.js backend URL (legacy, using direct MongoDB now)

# API Client configuration
api:
  client:
    timeout: 300  # Request timeout in seconds
  
  # External API endpoints configuration
  # Configure all external APIs here - can be overridden per environment
  endpoints:
    # LLM endpoint (LM Studio, OpenAI, Azure OpenAI, etc.)
    llm:
      url: http://127.0.0.1:1234/v1/chat/completions
      api-key: lm-studio
      model: google/gemma-2-9b  # Model identifier
      headers:
        Content-Type: application/json
    
    # Example: Payment gateway endpoint
    # payment:
    #   url: https://api.payment-provider.com
    #   api-key: ${PAYMENT_API_KEY}
    #   headers:
    #     Content-Type: application/json
    
    # Example: Notification service endpoint
    # notification:
    #   url: https://api.notification-service.com
    #   api-key: ${NOTIFICATION_API_KEY}

# Logging configuration
logging:
  level:
    root: INFO
    com.ai.va: INFO
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG
    com.ai.va.interceptor: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
