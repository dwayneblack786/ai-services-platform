# Production Environment Configuration
# Using Azure OpenAI Service

# STT Configuration - Azure Speech (Production)
stt.provider=azure
azure.speech.key=${AZURE_SPEECH_KEY}
azure.speech.region=${AZURE_SPEECH_REGION:eastus}

# TTS Configuration - Azure Speech (Production)
tts.provider=azure
tts.azure.subscription-key=${AZURE_SPEECH_KEY}
tts.azure.region=${AZURE_SPEECH_REGION:eastus}
tts.azure.voice=en-US-AriaNeural
tts.azure.format=audio-24khz-48kbitrate-mono-mp3
# Alternative high-quality voices:
# tts.azure.voice=en-US-JennyNeural (conversational)
# tts.azure.voice=en-US-GuyNeural (male)
# tts.azure.voice=en-US-SaraNeural (natural)

# Azure OpenAI Configuration
# Override these with environment variables in Azure
api.endpoints.llm.provider=azure-openai
api.endpoints.llm.url=${AZURE_OPENAI_ENDPOINT}
api.endpoints.llm.api-key=${AZURE_OPENAI_KEY}
api.endpoints.llm.model=gpt-4
api.endpoints.llm.deployment=${AZURE_OPENAI_DEPLOYMENT:gpt-4}

spring.ai.openai.base-url=${AZURE_OPENAI_ENDPOINT}
spring.ai.openai.api-key=${AZURE_OPENAI_KEY}
spring.ai.openai.chat.options.model=${AZURE_OPENAI_DEPLOYMENT:gpt-4}
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=500

# Production settings
agent.execution.timeout=30000
logging.level.com.ai.va.agent=INFO
logging.level.com.ai.va.service.stt=INFO
logging.level.com.ai.va.grpc=INFO

