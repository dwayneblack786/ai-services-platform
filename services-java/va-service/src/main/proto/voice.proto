syntax = "proto3";

package com.ai.va.grpc;

option java_multiple_files = true;
option java_package = "com.ai.va.grpc";
option java_outer_classname = "VoiceProto";

// Voice service with bidirectional streaming for real-time audio
service VoiceService {
  // Bidirectional streaming for voice conversation
  // Client sends audio chunks, server sends transcriptions and responses
  rpc StreamVoiceConversation(stream VoiceRequest) returns (stream VoiceResponse);
  
  // Single request/response for voice (non-streaming fallback)
  rpc ProcessVoice(VoiceRequest) returns (VoiceResponse);
  
  // STT-specific: Transcribe audio chunks (streaming)
  // Client sends audio chunks, server returns transcriptions as they become available
  rpc TranscribeStream(stream AudioChunk) returns (stream TranscriptionResponse);
  
  // STT-specific: Transcribe single audio file (non-streaming)
  rpc Transcribe(AudioChunk) returns (TranscriptionResponse);
  
  // TTS-specific: Synthesize text to speech (single request)
  rpc Synthesize(SynthesisRequest) returns (AudioResponse);
  
  // TTS-specific: Synthesize text to speech (streaming)
  // Client sends text chunks, server returns audio chunks as they become available
  rpc SynthesizeStream(stream TextChunk) returns (stream AudioResponse);
}

// Health check service
service HealthService {
  // Check health of voice service components
  rpc Check(HealthCheckRequest) returns (HealthCheckResponse);
}

// Voice request with audio data
message VoiceRequest {
  string session_id = 1;
  bytes audio_data = 2;         // Audio chunk in bytes
  AudioFormat format = 3;
  bool is_final_chunk = 4;      // Indicates end of audio stream
  string customer_id = 5;
}

// Audio format specification
message AudioFormat {
  string encoding = 1;          // e.g., "LINEAR16", "MULAW", "WEBM_OPUS"
  int32 sample_rate = 2;        // e.g., 16000, 8000
  int32 channels = 3;           // 1 for mono, 2 for stereo
}

// Voice response with transcription and assistant reply
message VoiceResponse {
  string session_id = 1;
  string transcription = 2;     // What user said
  string response_text = 3;     // Assistant's text response
  bytes response_audio = 4;     // Assistant's audio response (TTS)
  bool is_interim = 5;          // True for interim transcription results
  bool is_final = 6;            // True for final response
  string intent = 7;
  bool requires_action = 8;
  string suggested_action = 9;
}

// ============================================================================
// STT (Speech-to-Text) Messages
// ============================================================================

// Audio chunk for STT processing
message AudioChunk {
  string session_id = 1;         // Session identifier
  bytes audio_data = 2;          // Raw audio bytes
  string format = 3;             // Audio format: "webm", "wav", "ogg", "mp3"
  int64 timestamp = 4;           // Client timestamp in milliseconds
  int32 sequence_number = 5;     // Chunk sequence for ordering
  string customer_id = 6;        // Customer ID for billing/tracking
  bool is_final_chunk = 7;       // Indicates end of audio stream
}

// Transcription response from STT service
message TranscriptionResponse {
  string session_id = 1;         // Session identifier
  string text = 2;               // Transcribed text
  double confidence = 3;         // Confidence score 0.0-1.0
  bool is_final = 4;             // True if final transcription, false for interim
  int64 duration_ms = 5;         // Audio duration in milliseconds
  string language = 6;           // Detected/configured language (e.g., "en-US")
  TranscriptionMetadata metadata = 7; // Additional metadata
}

// Metadata about the transcription process
message TranscriptionMetadata {
  string provider = 1;           // STT provider: "whisper" or "azure"
  int64 processing_time_ms = 2;  // STT processing time in milliseconds
  repeated WordTimestamp words = 3; // Word-level timestamps (optional, provider-dependent)
  string model = 4;              // Model used (e.g., "whisper-base", "whisper-large")
  bool streaming = 5;            // Whether streaming transcription was used
}

// Word-level timestamp information
message WordTimestamp {
  string word = 1;               // The word
  int64 start_ms = 2;            // Start time in milliseconds
  int64 end_ms = 3;              // End time in milliseconds
  double confidence = 4;         // Confidence score for this word (0.0-1.0)
}

// ============================================================================
// TTS (Text-to-Speech) Messages
// ============================================================================

// Synthesis request for TTS
message SynthesisRequest {
  string session_id = 1;         // Session identifier
  string text = 2;               // Text to synthesize
  string language = 3;           // Language code (e.g., "en-US", "es-ES")
  string voice_name = 4;         // Optional: specific voice to use
  string format = 5;             // Audio format: "mp3", "wav", "ogg", "webm"
  string customer_id = 6;        // Customer ID for billing/tracking
}

// Text chunk for streaming TTS
message TextChunk {
  string session_id = 1;         // Session identifier
  string text = 2;               // Text chunk to synthesize
  string language = 3;           // Language code
  string voice_name = 4;         // Optional: voice name
  int32 sequence_number = 5;     // Chunk sequence for ordering
  bool is_final_chunk = 6;       // Indicates end of text stream
  string customer_id = 7;        // Customer ID for billing/tracking
}

// Audio response from TTS service
message AudioResponse {
  string session_id = 1;         // Session identifier
  bytes audio_data = 2;          // Synthesized audio bytes
  string format = 3;             // Audio format: "mp3", "wav", "ogg", "webm"
  AudioMetadata metadata = 4;    // Additional metadata
}

// Metadata about the synthesis process
message AudioMetadata {
  string voice_name = 1;         // Voice used for synthesis
  string language = 2;           // Language of the audio
  int64 duration_ms = 3;         // Audio duration in milliseconds
  int32 sample_rate = 4;         // Sample rate (e.g., 24000)
  int32 bitrate = 5;             // Bitrate (e.g., 48000)
  string provider = 6;           // TTS provider: "azure", "elevenlabs", "google"
  int64 processing_time_ms = 7;  // TTS processing time in milliseconds
  bool success = 8;              // Whether synthesis was successful
  string error_message = 9;      // Error message if failed
}

// ============================================================================
// Health Check
// ============================================================================

// Health check request
message HealthCheckRequest {
  string service = 1;            // Optional: specific service to check ("stt", "tts", "all")
}

// Health check response
message HealthCheckResponse {
  enum ServingStatus {
    UNKNOWN = 0;
    SERVING = 1;
    NOT_SERVING = 2;
  }
  ServingStatus status = 1;
  string message = 2;            // Optional status message
  map<string, string> details = 3; // Additional details (provider, version, etc.)
}
