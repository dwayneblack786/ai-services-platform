<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="brainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="circuitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Neural network brain shape -->
  <path d="M50 10 C30 10, 15 25, 15 45 C15 55, 18 63, 23 68 L23 75 C23 80, 27 85, 32 85 L68 85 C73 85, 77 80, 77 75 L77 68 C82 63, 85 55, 85 45 C85 25, 70 10, 50 10 Z" 
        fill="url(#brainGradient)" 
        stroke="#5a67d8" 
        stroke-width="2"/>
  
  <!-- Neural nodes (brain lobes) -->
  <circle cx="35" cy="35" r="8" fill="#f093fb" opacity="0.8"/>
  <circle cx="65" cy="35" r="8" fill="#f093fb" opacity="0.8"/>
  <circle cx="50" cy="50" r="10" fill="#f5576c" opacity="0.9"/>
  <circle cx="35" cy="60" r="6" fill="#ffd89b" opacity="0.8"/>
  <circle cx="65" cy="60" r="6" fill="#ffd89b" opacity="0.8"/>
  
  <!-- Connection lines (neural pathways) -->
  <line x1="35" y1="35" x2="50" y2="50" stroke="#fff" stroke-width="2" opacity="0.6"/>
  <line x1="65" y1="35" x2="50" y2="50" stroke="#fff" stroke-width="2" opacity="0.6"/>
  <line x1="50" y1="50" x2="35" y2="60" stroke="#fff" stroke-width="2" opacity="0.6"/>
  <line x1="50" y1="50" x2="65" y2="60" stroke="#fff" stroke-width="2" opacity="0.6"/>
  <line x1="35" y1="35" x2="65" y2="35" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
  <line x1="35" y1="60" x2="65" y2="60" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Pulsing dots at connection points -->
  <circle cx="42" cy="42" r="2" fill="#fff">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="58" cy="42" r="2" fill="#fff">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="42" cy="55" r="2" fill="#fff">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="58" cy="55" r="2" fill="#fff">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
