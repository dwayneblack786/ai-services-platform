version: '3.8'

services:
  mongodb:
    image: docker.io/library/mongo:7.0
    container_name: pm-mongodb-dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: ai_platform
    volumes:
      - pm_mongodb_data:/data/db
      - pm_mongodb_config:/data/configdb
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: pm-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - pm_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  pm_mongodb_data:
    driver: local
  pm_mongodb_config:
    driver: local
  pm_redis_data:
    driver: local
