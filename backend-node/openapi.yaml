openapi: 3.0.3
info:
  title: AI Services Platform API
  version: 2.0.0
  description: APIs for AI-powered services including Virtual Assistant, IDP, Computer Vision, Authentication, and more.
  contact:
    name: AI Services Platform Support
    email: support@aiservicesplatform.com

servers:
  - url: http://localhost:5000
    description: Local development server
  - url: https://api.yourdomain.com
    description: Production server

tags:
  - name: Authentication
    description: User authentication and session management
  - name: Users
    description: User management operations
  - name: Products
    description: Product catalog and subscriptions
  - name: Product Configurations
    description: Product-specific configuration management
  - name: Tenants
    description: Multi-tenant management
  - name: Voice Assistant
    description: Voice-based AI assistant endpoints
  - name: Chat Assistant
    description: Chat-based AI assistant endpoints
  - name: Assistant Channels
    description: Channel configuration for assistants
  - name: Prompts
    description: Prompt template management
  - name: Payments
    description: Payment methods management
  - name: Transactions
    description: Transaction history and management
  - name: Subscriptions
    description: Subscription management
  - name: User Products
    description: User product subscriptions
  - name: Usage
    description: Usage metrics and reporting

paths:
  # Authentication Endpoints
  /api/auth/google:
    get:
      summary: Initiate Google OAuth2 authentication
      tags: [Authentication]
      description: Redirects user to Google OAuth consent screen
      responses:
        '302':
          description: Redirect to Google OAuth
        '500':
          description: Authentication error
  
  /api/auth/google/callback:
    get:
      summary: Google OAuth2 callback handler
      tags: [Authentication]
      description: Handles OAuth2 callback from Google
      parameters:
        - in: query
          name: code
          schema:
            type: string
          description: Authorization code from Google
      responses:
        '302':
          description: Redirect to frontend with session
        '401':
          description: Authentication failed

  /api/auth/dev-login:
    post:
      summary: Development login bypass
      tags: [Authentication]
      description: Development-only endpoint for testing without OAuth (NODE_ENV=development)
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '403':
          description: Only available in development mode

  /api/auth/status:
    get:
      summary: Check authentication status
      tags: [Authentication]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Authentication status
          content:
            application/json:
              schema:
                type: object
                properties:
                  isAuthenticated:
                    type: boolean
                  user:
                    $ref: '#/components/schemas/User'

  /api/auth/login:
    post:
      summary: Login with email and password
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
              required: [email, password]
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Invalid credentials

  /api/auth/logout:
    post:
      summary: Logout current user
      tags: [Authentication]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

  /api/user/me:
    get:
      summary: Get current user profile
      tags: [Users]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized

  # Chat Assistant Endpoints
  /api/chat/session:
    post:
      summary: Initialize a new chat session
      tags: [Chat Assistant]
      security:
        - cookieAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: string
                  description: Product ID (defaults to va-service)
                forceNew:
                  type: boolean
                  description: Force creation of new session even if active session exists
      responses:
        '200':
          description: Chat session initialized
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessionId:
                    type: string
                  customerId:
                    type: string
                  productId:
                    type: string
                  status:
                    type: string
                    enum: [initialized, resumed]
                  message:
                    type: string
                  messages:
                    type: array
                    description: Chat history (if resuming existing session)
                    items:
                      type: object
                  chatConfig:
                    type: object
                    properties:
                      greeting:
                        type: string
                      typingIndicator:
                        type: boolean
                      maxTurns:
                        type: integer
                      showIntent:
                        type: boolean
        '401':
          description: Unauthorized
        '403':
          description: Chat channel not enabled
        '502':
          description: Failed to start chat session

  /api/chat/message:
    post:
      summary: Send a message in an active chat session
      tags: [Chat Assistant]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionId:
                  type: string
                message:
                  type: string
              required: [sessionId, message]
      responses:
        '200':
          description: Message processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessionId:
                    type: string
                  message:
                    type: string
                  intent:
                    type: string
                  extractedSlots:
                    type: object
                  requiresAction:
                    type: boolean
                  suggestedAction:
                    type: string
        '400':
          description: Missing required fields
        '502':
          description: Failed to process message

  /api/chat/end:
    post:
      summary: End a chat session
      tags: [Chat Assistant]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionId:
                  type: string
              required: [sessionId]
      responses:
        '200':
          description: Chat session ended
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '400':
          description: Missing sessionId

  /api/chat/history/{sessionId}:
    get:
      summary: Get conversation history for a session
      tags: [Chat Assistant]
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Chat history
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessionId:
                    type: string
                  messages:
                    type: array
                    items:
                      type: object
                      properties:
                        speaker:
                          type: string
                          enum: [user, assistant]
                        text:
                          type: string
                        timestamp:
                          type: string
                          format: date-time
        '404':
          description: Session not found

  # Usage Endpoints
  /api/usage/assistant-call:
    post:
      summary: Update usage metrics for a call or session
      tags: [Usage]
      description: Receives usage metrics from Java VA service
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                callId:
                  type: string
                  description: Call ID (ObjectId) or session ID (UUID)
                customerId:
                  type: string
                sttSeconds:
                  type: number
                ttsCharacters:
                  type: number
                llmTokensIn:
                  type: integer
                llmTokensOut:
                  type: integer
                provider:
                  type: string
                costEstimate:
                  type: number
              required: [callId]
      responses:
        '200':
          description: Usage updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  callId:
                    type: string
        '404':
          description: Call not found

  /api/usage/assistant-call/{callId}:
    get:
      summary: Get usage metrics for a specific call
      tags: [Usage]
      parameters:
        - in: path
          name: callId
          required: true
          schema:
            type: string
          description: Call ID (ObjectId) or session ID (UUID)
      responses:
        '200':
          description: Usage metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  callId:
                    type: string
                  customerId:
                    type: string
                  usage:
                    type: object
                    properties:
                      sttSeconds:
                        type: number
                      ttsCharacters:
                        type: number
                      llmTokensIn:
                        type: integer
                      llmTokensOut:
                        type: integer
        '404':
          description: Call not found

  # Transactions Endpoints
  /api/transactions:
    get:
      summary: Get all transactions for tenant
      tags: [Transactions]
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
        - in: query
          name: status
          schema:
            type: string
            enum: [success, failed, pending, refunded]
        - in: query
          name: paymentMethodId
          schema:
            type: string
      responses:
        '200':
          description: List of transactions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  transactions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Transaction'
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
        '401':
          description: Unauthorized

  /api/transactions/{transactionId}:
    get:
      summary: Get transaction by ID
      tags: [Transactions]
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: transactionId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Transaction details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  transaction:
                    $ref: '#/components/schemas/Transaction'
        '404':
          description: Transaction not found

  /api/transactions/payment-method/{paymentMethodId}:
    get:
      summary: Get transactions for a specific payment method
      tags: [Transactions]
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: paymentMethodId
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: List of transactions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  transactions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Transaction'

  /api/transactions/stats/summary:
    get:
      summary: Get transaction statistics
      tags: [Transactions]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Transaction statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  stats:
                    type: object
                    properties:
                      total:
                        type: integer
                      successful:
                        type: integer
                      failed:
                        type: integer
                      pending:
                        type: integer
                      refunded:
                        type: integer
                      totalAmount:
                        type: number
                      averageAmount:
                        type: number
                      thisMonth:
                        type: number
                      lastMonth:
                        type: number

  # Tenants Endpoints
  /api/tenants:
    get:
      summary: Get all tenants (Admin only)
      tags: [Tenants]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: List of tenants
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  tenants:
                    type: array
                    items:
                      type: object
                      properties:
                        tenantId:
                          type: string
                        users:
                          type: array
                          items:
                            $ref: '#/components/schemas/User'
        '403':
          description: Admin access required
    post:
      summary: Create a new tenant (Admin only)
      tags: [Tenants]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
              required: [name]
      responses:
        '200':
          description: Tenant created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  tenant:
                    type: object
                    properties:
                      tenantId:
                        type: string
                      name:
                        type: string
                  message:
                    type: string
        '400':
          description: Tenant name required

  /api/tenants/{tenantId}/users:
    get:
      summary: Get users by tenant
      tags: [Tenants]
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: tenantId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of tenant users
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '403':
          description: Access denied to this tenant

  /api/tenants/users/all:
    get:
      summary: Get all users with tenant info (Admin or own tenant)
      tags: [Tenants]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: List of all users
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'

  /api/tenants/users/{userId}/tenant:
    put:
      summary: Assign user to tenant (Admin only)
      tags: [Tenants]
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tenantId:
                  type: string
              required: [tenantId]
      responses:
        '200':
          description: User tenant updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '404':
          description: User not found

  # User Products Endpoints
  /api/user-products:
    get:
      summary: Get user's subscribed products
      tags: [User Products]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: List of user products
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  userProducts:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserProduct'
        '401':
          description: Unauthorized
    post:
      summary: Subscribe to a product
      tags: [User Products]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: string
                paymentMethodId:
                  type: string
              required: [productId, paymentMethodId]
      responses:
        '200':
          description: Subscribed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  userProduct:
                    $ref: '#/components/schemas/UserProduct'
        '400':
          description: Already subscribed or invalid data
        '404':
          description: Product or payment method not found

  /api/user-products/{productId}:
    delete:
      summary: Unsubscribe from a product
      tags: [User Products]
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Unsubscribed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '404':
          description: Subscription not found

  # Products Endpoints
  /api/products:
    get:
      summary: Get all available products
      tags: [Products]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: List of products
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  products:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
    post:
      summary: Create a new product (Admin only)
      tags: [Products]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '200':
          description: Product created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  product:
                    $ref: '#/components/schemas/Product'

  /api/products/{id}:
    get:
      summary: Get product by ID
      tags: [Products]
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  product:
                    $ref: '#/components/schemas/Product'
    put:
      summary: Update product (Admin only)
      tags: [Products]
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  product:
                    $ref: '#/components/schemas/Product'
    delete:
      summary: Delete product (Admin only)
      tags: [Products]
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

  /api/products/{id}/status:
    patch:
      summary: Update product status (Admin only)
      tags: [Products]
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                isActive:
                  type: boolean
              required: [isActive]
      responses:
        '200':
          description: Product status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  product:
                    $ref: '#/components/schemas/Product'

  # Product Configuration Endpoints
  /api/product-configurations:
    get:
      summary: Get all product configurations for current tenant
      tags: [Product Configurations]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: List of product configurations
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  configurations:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductConfiguration'
        '401':
          description: Unauthorized
    post:
      summary: Create or update product configuration for a specific product
      tags: [Product Configurations]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: string
                  description: The product ID to configure
                configuration:
                  type: object
                  description: Product-specific configuration settings
              required: [productId, configuration]
      responses:
        '200':
          description: Configuration saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  configuration:
                    $ref: '#/components/schemas/ProductConfiguration'
        '401':
          description: Unauthorized

  /api/product-configurations/{productId}:
    get:
      summary: Get configuration for a specific product
      tags: [Product Configurations]
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
          description: The product ID to get configuration for
      responses:
        '200':
          description: Product configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  configuration:
                    $ref: '#/components/schemas/ProductConfiguration'
        '404':
          description: Configuration not found
        '401':
          description: Unauthorized
    delete:
      summary: Delete configuration for a specific product (Admin only)
      tags: [Product Configurations]
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Configuration deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '403':
          description: Admin access required
        '401':
          description: Unauthorized

  # Assistant Channels Endpoints
  /api/assistant-channels:
    get:
      summary: Get all assistant channel configurations for tenant
      tags: [Assistant Channels]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: List of channel configurations
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  channels:
                    type: array
                    items:
                      $ref: '#/components/schemas/AssistantChannels'
        '401':
          description: Unauthorized
    patch:
      summary: Update assistant channel configuration
      tags: [Assistant Channels]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: string
                voice:
                  type: object
                chat:
                  type: object
              required: [productId]
      responses:
        '200':
          description: Configuration updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  channels:
                    $ref: '#/components/schemas/AssistantChannels'
        '401':
          description: Unauthorized

  /api/assistant-channels/voice:
    patch:
      summary: Update voice channel configuration
      tags: [Assistant Channels]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: string
                voiceConfig:
                  $ref: '#/components/schemas/VoiceChannel'
              required: [productId]
      responses:
        '200':
          description: Voice configuration updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  channels:
                    $ref: '#/components/schemas/AssistantChannels'

  /api/assistant-channels/chat:
    patch:
      summary: Update chat channel configuration
      tags: [Assistant Channels]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: string
                chatConfig:
                  $ref: '#/components/schemas/ChatChannel'
              required: [productId]
      responses:
        '200':
          description: Chat configuration updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  channels:
                    $ref: '#/components/schemas/AssistantChannels'

  /api/assistant-channels/voice/toggle:
    post:
      summary: Toggle voice channel on/off
      tags: [Assistant Channels]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: string
                enabled:
                  type: boolean
              required: [productId, enabled]
      responses:
        '200':
          description: Voice channel toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

  /api/assistant-channels/chat/toggle:
    post:
      summary: Toggle chat channel on/off
      tags: [Assistant Channels]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: string
                enabled:
                  type: boolean
              required: [productId, enabled]
      responses:
        '200':
          description: Chat channel toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

  /api/assistant-channels/by-phone/{phoneNumber}:
    get:
      summary: Get assistant channels by phone number
      tags: [Assistant Channels]
      description: Public endpoint for telephony providers (no auth required)
      parameters:
        - in: path
          name: phoneNumber
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Channel configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssistantChannels'
        '404':
          description: Phone number not found

  /api/assistant-channels/{productId}:
    get:
      summary: Get assistant channel configuration for a product
      tags: [Assistant Channels]
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Channel configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssistantChannels'
        '404':
          description: Channel not found
        '401':
          description: Unauthorized

  # Prompts Endpoints
  /api/prompts:
    get:
      summary: Get all default prompt templates
      tags: [Prompts]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of default prompts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PromptTemplate'

  /api/prompts/customer/{id}:
    get:
      summary: Get a specific prompt template by ID
      tags: [Prompts]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Prompt template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptTemplate'
        '404':
          description: Template not found

  /api/prompts/industry/{industry}:
    get:
      summary: Get prompts for a specific industry
      tags: [Prompts]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: industry
          required: true
          schema:
            type: string
            enum: [healthcare, real-estate, legal, hospitality, retail, finance, education]
      responses:
        '200':
          description: Industry-specific prompt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptTemplate'

  # Payment Methods Endpoints
  /api/payment-methods:
    get:
      summary: Get all payment methods for current user
      tags: [Payments]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of payment methods
          content:
            application/json:
              schema:
                type: object
                properties:
                  paymentMethods:
                    type: array
                    items:
                      $ref: '#/components/schemas/PaymentMethod'
    post:
      summary: Add a new payment method
      tags: [Payments]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cardBrand:
                  type: string
                cardLast4:
                  type: string
                cardExpMonth:
                  type: integer
                cardExpYear:
                  type: integer
                billingName:
                  type: string
                billingEmail:
                  type: string
              required: [cardBrand, cardLast4, cardExpMonth, cardExpYear, billingName]
      responses:
        '201':
          description: Payment method created

  /api/payment-methods/{id}:
    delete:
      summary: Remove a payment method
      tags: [Payments]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Payment method removed

  /api/payment-methods/{id}/set-default:
    patch:
      summary: Set payment method as default
      tags: [Payments]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Default payment method updated

  # Subscriptions Endpoints
  /api/subscriptions:
    get:
      summary: Get user subscriptions
      tags: [Subscriptions]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: List of subscriptions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  subscriptions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Subscription'
        '401':
          description: Unauthorized
    post:
      summary: Create a new subscription
      tags: [Subscriptions]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: string
                paymentMethodId:
                  type: string
                tierId:
                  type: string
              required: [productId, paymentMethodId, tierId]
      responses:
        '200':
          description: Subscription created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  subscription:
                    $ref: '#/components/schemas/Subscription'
        '400':
          description: Invalid request data
        '401':
          description: Unauthorized

  /api/subscriptions/create:
    post:
      summary: Create subscription with validation
      tags: [Subscriptions]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: string
                tierId:
                  type: string
                paymentMethodId:
                  type: string
              required: [productId, tierId, paymentMethodId]
      responses:
        '200':
          description: Subscription created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  subscription:
                    $ref: '#/components/schemas/Subscription'
        '400':
          description: Validation failed

  /api/subscriptions/validate-payment:
    post:
      summary: Validate payment method for subscription
      tags: [Subscriptions]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                paymentMethodId:
                  type: string
              required: [paymentMethodId]
      responses:
        '200':
          description: Payment method valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  valid:
                    type: boolean
        '400':
          description: Invalid payment method

  /api/subscriptions/product/{productId}:
    get:
      summary: Get subscription for a specific product
      tags: [Subscriptions]
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product subscription
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  subscription:
                    $ref: '#/components/schemas/Subscription'
        '404':
          description: Subscription not found

  /api/subscriptions/{subscriptionId}:
    patch:
      summary: Update subscription
      tags: [Subscriptions]
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: subscriptionId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tierId:
                  type: string
                status:
                  type: string
                  enum: [active, inactive, cancelled, suspended]
                autoRenew:
                  type: boolean
      responses:
        '200':
          description: Subscription updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  subscription:
                    $ref: '#/components/schemas/Subscription'
        '404':
          description: Subscription not found

  /api/subscriptions/{subscriptionId}/billing:
    get:
      summary: Get billing history for subscription
      tags: [Subscriptions]
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: subscriptionId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Billing history
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  billingHistory:
                    type: array
                    items:
                      type: object
        '404':
          description: Subscription not found
    post:
      summary: Create billing record for subscription
      tags: [Subscriptions]
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: subscriptionId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                description:
                  type: string
              required: [amount]
      responses:
        '200':
          description: Billing record created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  billingRecord:
                    type: object

  # Voice Assistant Endpoints
  /voice/incoming:
    post:
      summary: Handle incoming phone call webhook from telephony provider
      tags: [Voice Assistant]
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                To:
                  type: string
                  description: The number that was called (assistant phone number)
                From:
                  type: string
                  description: Caller phone number
                CallSid:
                  type: string
                  description: Telephony provider call identifier
              required: [To, From]
      responses:
        '200':
          description: TwiML/voice instructions to the telephony provider
          content:
            application/xml:
              schema:
                type: string
        '400':
          description: Invalid request

  /voice/stream:
    post:
      summary: Handle streaming audio chunks during an active call
      tags: [Voice Assistant]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                callId:
                  type: string
                  description: Internal call identifier (assistant_calls._id)
                audioChunk:
                  type: string
                  format: byte
                  description: Encoded audio chunk from telephony provider
              required: [callId, audioChunk]
      responses:
        '200':
          description: Voice response or streaming instructions
          content:
            application/json:
              schema:
                type: object
                properties:
                  ttsAudio:
                    type: string
                    format: byte
                    description: Encoded audio to play back to caller
        '400':
          description: Invalid payload

  /voice/end:
    post:
      summary: Mark a call as ended and finalize metrics
      tags: [Voice Assistant]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                callId:
                  type: string
                durationSeconds:
                  type: integer
                endedBy:
                  type: string
                  enum: [caller, assistant, system]
              required: [callId, durationSeconds, endedBy]
      responses:
        '200':
          description: Call end recorded
        '400':
          description: Invalid payload

  /assistant/settings:
    get:
      summary: Get phone assistant settings for current customer
      tags: [Voice Assistant]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Assistant settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssistantSettings'
        '401':
          description: Unauthorized
    patch:
      summary: Update phone assistant settings for current customer
      tags: [Voice Assistant]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAssistantSettingsRequest'
      responses:
        '200':
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssistantSettings'
        '400':
          description: Invalid data
        '401':
          description: Unauthorized

  /assistant/calls:
    get:
      summary: List assistant call logs for current customer
      tags: [Voice Assistant]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
        - in: query
          name: status
          schema:
            type: string
            enum: [completed, missed, forwarded, failed]
      responses:
        '200':
          description: List of call logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AssistantCall'
        '401':
          description: Unauthorized

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: connect.sid
      description: Session cookie for authentication
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [USER, TENANT_USER, TENANT_ADMIN, PROJECT_ADMIN, SUPER_ADMIN]
        tenantId:
          type: string
        customerId:
          type: string
        emailVerified:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Product:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [Virtual Assistant, IDP, Computer Vision]
        features:
          type: array
          items:
            type: string
        pricing:
          type: object
          properties:
            tiers:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  price:
                    type: number
                  billingPeriod:
                    type: string
                  features:
                    type: array
                    items:
                      type: string
        defaultPromptTemplateId:
          type: string
          description: Reference to the default prompt template for this product
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProductInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [Virtual Assistant, IDP, Computer Vision]
        features:
          type: array
          items:
            type: string
        pricing:
          type: object
        defaultPromptTemplateId:
          type: string
        isActive:
          type: boolean
      required: [name, description, category]

    ProductConfiguration:
      type: object
      properties:
        _id:
          type: string
        tenantId:
          type: string
          description: The tenant this configuration belongs to
        productId:
          type: string
          description: The product this configuration is for
        userId:
          type: string
          description: User who created/updated the configuration
        configuration:
          type: object
          description: Product-specific configuration key-value pairs
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [active, inactive]
          description: Configuration status

    Transaction:
      type: object
      properties:
        _id:
          type: string
        tenantId:
          type: string
        customerId:
          type: string
        paymentMethodId:
          type: string
        amount:
          type: number
          description: Amount in cents
        currency:
          type: string
          default: USD
        status:
          type: string
          enum: [success, failed, pending, refunded]
        description:
          type: string
        metadata:
          type: object
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserProduct:
      type: object
      properties:
        _id:
          type: string
        userId:
          type: string
        productId:
          type: string
        subscribedAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [active, cancelled]

    AssistantChannels:
      type: object
      properties:
        _id:
          type: string
        tenantId:
          type: string
        productId:
          type: string
        voice:
          $ref: '#/components/schemas/VoiceChannel'
        chat:
          $ref: '#/components/schemas/ChatChannel'
        sms:
          $ref: '#/components/schemas/SmsChannel'
        whatsapp:
          $ref: '#/components/schemas/WhatsAppChannel'

    VoiceChannel:
      type: object
      properties:
        enabled:
          type: boolean
        phoneNumber:
          type: string
        fallbackNumber:
          type: string
        promptTemplateId:
          type: string
        customPrompts:
          type: object
        ragConfig:
          type: object
        promptContext:
          type: object
        voiceSettings:
          type: object
          properties:
            language:
              type: string
            voiceId:
              type: string

    ChatChannel:
      type: object
      properties:
        enabled:
          type: boolean
        promptTemplateId:
          type: string
        customPrompts:
          type: object
        ragConfig:
          type: object
        promptContext:
          type: object
        greeting:
          type: string
        typingIndicator:
          type: boolean
        maxTurns:
          type: integer

    SmsChannel:
      type: object
      properties:
        enabled:
          type: boolean
        phoneNumber:
          type: string

    WhatsAppChannel:
      type: object
      properties:
        enabled:
          type: boolean
        businessAccountId:
          type: string

    PromptTemplate:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        description:
          type: string
        industry:
          type: string
        productCategory:
          type: string
        voice:
          type: object
          properties:
            systemPrompt:
              type: string
            greeting:
              type: string
            fallbackMessage:
              type: string
            closingMessage:
              type: string
        chat:
          type: object
          properties:
            systemPrompt:
              type: string
            greeting:
              type: string
            fallbackMessage:
              type: string
            closingMessage:
              type: string
        isDefault:
          type: boolean

    PaymentMethod:
      type: object
      properties:
        _id:
          type: string
        customerId:
          type: string
        cardBrand:
          type: string
        cardLast4:
          type: string
        cardExpMonth:
          type: integer
        cardExpYear:
          type: integer
        billingName:
          type: string
        billingEmail:
          type: string
        isDefault:
          type: boolean
        status:
          type: string
          enum: [active, expired, removed]
        transactionCount:
          type: integer
        lastTransactionDate:
          type: string
          format: date-time

    Subscription:
      type: object
      properties:
        _id:
          type: string
        tenantId:
          type: string
        customerId:
          type: string
        productId:
          type: string
        tierId:
          type: string
          description: Product tier ID
        status:
          type: string
          enum: [active, inactive, cancelled, suspended]
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        autoRenew:
          type: boolean
        usage:
          type: object
          properties:
            sttSeconds:
              type: number
            ttsCharacters:
              type: number
            llmTokensIn:
              type: integer
            llmTokensOut:
              type: integer
            totalCost:
              type: number
            lastUpdated:
              type: string
              format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AssistantSettings:
      type: object
      properties:
        customerId:
          type: string
        phoneEnabled:
          type: boolean
        phoneNumber:
          type: string
        fallbackNumber:
          type: string
          nullable: true
        businessHours:
          type: object
          properties:
            timezone:
              type: string
            monday:
              $ref: '#/components/schemas/BusinessHoursDay'
            tuesday:
              $ref: '#/components/schemas/BusinessHoursDay'
            wednesday:
              $ref: '#/components/schemas/BusinessHoursDay'
            thursday:
              $ref: '#/components/schemas/BusinessHoursDay'
            friday:
              $ref: '#/components/schemas/BusinessHoursDay'
            saturday:
              $ref: '#/components/schemas/BusinessHoursDay'
            sunday:
              $ref: '#/components/schemas/BusinessHoursDay'
        voice:
          type: object
          properties:
            language:
              type: string
              example: en-US
            voiceId:
              type: string
            speechRate:
              type: number
              format: float
      required: [customerId, phoneEnabled, phoneNumber]

    BusinessHoursDay:
      type: object
      properties:
        open:
          type: string
          nullable: true
          example: "09:00"
        close:
          type: string
          nullable: true
          example: "17:00"

    UpdateAssistantSettingsRequest:
      type: object
      properties:
        phoneEnabled:
          type: boolean
        fallbackNumber:
          type: string
        businessHours:
          type: object
        voice:
          type: object
      additionalProperties: false

    AssistantCall:
      type: object
      properties:
        id:
          type: string
        customerId:
          type: string
        assistantPhoneNumber:
          type: string
        callerNumber:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
          nullable: true
        durationSeconds:
          type: integer
          nullable: true
        status:
          type: string
          enum: [completed, missed, forwarded, failed, in_progress]
        endedBy:
          type: string
          enum: [caller, assistant, system]
          nullable: true
        forwardedTo:
          type: string
          nullable: true
        usage:
          type: object
          properties:
            sttSeconds:
              type: integer
            ttsCharacters:
              type: integer
            llmTokensIn:
              type: integer
            llmTokensOut:
              type: integer
        transcript:
          type: array
          items:
            $ref: '#/components/schemas/TranscriptTurn'
      required:
        - id
        - customerId
        - assistantPhoneNumber
        - callerNumber
        - startTime
        - status

    TranscriptTurn:
      type: object
      properties:
        speaker:
          type: string
          enum: [caller, assistant]
        text:
          type: string
        timestamp:
          type: number
          format: float
